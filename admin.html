<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Menü Yönetimi</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f5f5;
    }
    .kart {
      background: white;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    h1 { margin-bottom: 8px; }
    p { color: #666; margin-bottom: 24px; }
    a {
      display: inline-block;
      background: #34a853;
      color: white;
      padding: 14px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
    }
    .ipucu {
      margin-top: 24px;
      font-size: 13px;
      color: #999;
      text-align: left;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="kart">
    <h1>🍽️ Menü Yönetimi</h1>
    <p>Menüyü güncellemek için tabloya git:</p>
    <a href="https://docs.google.com/spreadsheets/d/SHEET_ID" target="_blank">
      Tabloyu Aç
    </a>
    <div class="ipucu">
      <strong>Hatırlatmalar:</strong><br>
      ✅ Ürün eklemek → yeni satır aç<br>
      ✅ Ürünü gizlemek → aktif sütununu FALSE yap<br>
      ✅ Fiyat değiştirmek → fiyat sütununu düzenle<br>
      ⏱️ Değişiklikler 1-2 dk içinde sitede görünür
    </div>
  </div>
</body>
</html>
