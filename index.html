<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>Adıyaman Pide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --black:      #000000;
  --black-soft: #0c0c0c;
  --black-card: #111111;
  --black-line: #222222;
  --gold:       #D4AF37;
  --gold-dim:   rgba(212,175,55,0.15);
  --gold-line:  rgba(212,175,55,0.3);
  --green:      #2E8B57;
  --green-line: rgba(46,139,87,0.35);
  --white:      #ffffff;
  --w60:        rgba(255,255,255,0.6);
  --w30:        rgba(255,255,255,0.3);
  --w10:        rgba(255,255,255,0.07);
  --fg:         'EB Garamond', Georgia, serif;
  --fm:         'Montserrat', system-ui, sans-serif;
  --touch:      52px;
  --r:          12px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html { font-size:16px; -webkit-text-size-adjust:100%; scroll-behavior:smooth; }
body { font-family:var(--fg); background:var(--black); color:var(--white); overflow-x:hidden; min-height:100dvh; }

/* ── LOADING ── */
#loading {
  position:fixed; inset:0; z-index:9999;
  background:var(--black);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
  transition:opacity .5s, visibility .5s;
}
#loading.out { opacity:0; visibility:hidden; pointer-events:none; }
.load-ring {
  width:56px; height:56px; border-radius:50%;
  border:1.5px solid var(--gold-line); border-top-color:var(--gold);
  animation:spin 1s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.load-txt { font-family:var(--fg); font-size:1.1rem; font-weight:600; color:var(--gold); letter-spacing:.12em; }

/* ── HEADER ── */
header {
  background:var(--black);
  padding:40px 20px 32px;
  text-align:center;
  border-bottom:1px solid var(--gold-line);
  position:relative;
}
header::after {
  content:''; position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:1px; height:28px; background:linear-gradient(to bottom,transparent,var(--gold));
}
.header-logo {
  width:90px; height:90px; border-radius:50%; object-fit:cover;
  border:1.5px solid var(--gold-line); margin:0 auto 18px; display:block;
}
.header-logo-fallback {
  width:90px; height:90px; border-radius:50%;
  border:1.5px solid var(--gold-line); background:var(--black-card);
  margin:0 auto 18px; display:flex; align-items:center; justify-content:center; font-size:2.2rem;
}
header h1 {
  font-family:var(--fg); font-size:clamp(1.6rem,7vw,2.6rem); font-weight:700;
  color:var(--gold); letter-spacing:.08em; text-transform:uppercase; line-height:1.05;
}
header h1 em {
  display:block; font-family:var(--fm); font-size:clamp(.55rem,2.2vw,.7rem); font-weight:500;
  color:var(--green); letter-spacing:.18em; text-transform:uppercase; font-style:normal; margin-top:8px;
}
.social-row { display:flex; align-items:center; justify-content:center; gap:14px; margin-top:18px; }
.social-link {
  display:flex; align-items:center; justify-content:center;
  width:38px; height:38px; border-radius:50%;
  border:.5px solid var(--gold-line); background:var(--black-card);
  color:var(--gold); text-decoration:none;
  transition:background .2s, border-color .2s, transform .2s;
}
.social-link:hover { background:var(--gold-dim); border-color:var(--gold); transform:scale(1.08); }
.social-link svg { width:18px; height:18px; fill:currentColor; }
.header-orn { display:flex; align-items:center; justify-content:center; gap:10px; margin-top:18px; }
.orn-line { width:50px; height:.5px; background:var(--gold-line); }
.orn-dot  { width:4px; height:4px; background:var(--gold); transform:rotate(45deg); }

/* ── DUYURU ── */
.announce-wrap { background:#060606; border-bottom:1px solid var(--black-line); position:relative; }
.announce-wrap::before {
  content:'◆'; position:absolute; left:12px; top:50%; transform:translateY(-50%);
  font-size:.5rem; color:var(--gold); z-index:2;
}
#announceCanvas { display:block; width:100%; height:50px; }

/* ── USTA NOTU ── */
.owner-band {
  background:linear-gradient(90deg,#0f0c00,#1a1500,#0f0c00);
  border-bottom:1px solid var(--gold-line);
  padding:12px 18px; display:flex; align-items:flex-start; gap:10px;
}
.owner-band-icon { font-size:1.2rem; flex-shrink:0; margin-top:1px; }
.owner-band-text { font-family:var(--fg); font-style:italic; font-size:.9rem; color:rgba(212,175,55,.85); line-height:1.6; }

/* ── KATEGORİ NAV ── */
.cat-nav {
  position:sticky; top:0; z-index:100;
  background:rgba(0,0,0,.97); border-bottom:1px solid var(--black-line);
  display:flex; overflow-x:auto; overflow-y:hidden;
  scrollbar-width:none; -webkit-overflow-scrolling:touch;
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
}
.cat-nav::-webkit-scrollbar { display:none; }
.cat-btn {
  flex-shrink:0; min-height:var(--touch); padding:0 16px;
  background:none; border:none; border-bottom:2px solid transparent;
  cursor:pointer; font-family:var(--fm); font-size:.65rem; font-weight:500;
  color:var(--w30); display:flex; align-items:center;
  transition:color .2s, border-color .2s, background .2s;
  white-space:nowrap; position:relative; bottom:-1px;
  letter-spacing:.1em; text-transform:uppercase;
}
.cat-btn:active { background:var(--w10); }
.cat-btn.on { color:var(--gold); border-bottom-color:var(--gold); font-weight:600; }

/* ── MAIN ── */
main { max-width:640px; margin:0 auto; padding:0 0 48px; }

/* ── BÖLÜM ── */
.sec { padding:28px 14px 8px; }
.sec-head {
  display:flex; align-items:center;
  margin-bottom:16px; padding-bottom:10px;
  border-bottom:.5px solid var(--black-line); position:relative;
}
.sec-head::after {
  content:''; position:absolute; bottom:-1px; left:0;
  width:48px; height:1.5px; background:var(--gold);
}
.sec-title { font-family:var(--fg); font-size:1.3rem; font-weight:700; color:var(--gold); letter-spacing:.08em; text-transform:uppercase; line-height:1; }
.sec-count { font-family:var(--fm); font-size:.58rem; font-weight:500; color:var(--green); letter-spacing:.1em; text-transform:uppercase; margin-left:auto; }

/* ── MENU LIST — boşluk artırıldı ── */
.menu-list { display:flex; flex-direction:column; gap:8px; }

/* ── KART (resimli) ── */
.card {
  background:var(--black-card);
  border:.5px solid var(--black-line); border-radius:var(--r);
  display:flex; align-items:stretch; overflow:hidden; min-height:88px;
  transition:border-color .2s, background .2s; position:relative;
  opacity:0; transform:translateY(10px); animation:fadeUp .4s ease forwards;
}
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }
.card:nth-child(1){animation-delay:.03s} .card:nth-child(2){animation-delay:.06s}
.card:nth-child(3){animation-delay:.09s} .card:nth-child(4){animation-delay:.12s}
.card:nth-child(5){animation-delay:.15s} .card:nth-child(6){animation-delay:.18s}
.card:nth-child(7){animation-delay:.21s} .card:nth-child(8){animation-delay:.24s}
.card:active { transform:scale(.987); }
.card:hover,.card:focus-visible { background:#161616; border-color:var(--gold-line); outline:none; }
.card.chef::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:2px; background:linear-gradient(to bottom,transparent,var(--gold),transparent);
}

/* Görsel alanı */
.card-img-wrap { width:96px; flex-shrink:0; background:#0e0e0e; position:relative; overflow:hidden; }
.card-shimmer {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center; overflow:hidden;
}
.card-shimmer img { width:60%; height:60%; object-fit:contain; opacity:.15; }
.card-shimmer::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);
  background-size:200% 100%; animation:shim 1.8s ease-in-out infinite;
}
@keyframes shim { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
.card-img { position:absolute; inset:0; z-index:1; width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity .35s ease; }
.card-img.show { opacity:1; }

/* ── KART (resimsiz) — resimli ile aynı stil ── */

/* Rozet */
.badge {
  position:absolute; top:7px; left:7px; z-index:2;
  font-family:var(--fm); font-size:.52rem; font-weight:700;
  letter-spacing:.06em; text-transform:uppercase;
  padding:3px 7px; border-radius:20px; white-space:nowrap;
}
.badge-gold  { background:var(--gold); color:#000; }
.badge-green { background:var(--green); color:#fff; }
.badge-dim   { background:rgba(255,255,255,.1); color:var(--w60); border:.5px solid rgba(255,255,255,.1); }

/* Kart gövdesi */
.card-body { flex:1; min-width:0; padding:12px 14px; display:flex; flex-direction:column; justify-content:center; gap:8px; }
.card-name { font-family:var(--fg); font-size:1rem; font-weight:600; color:var(--white); line-height:1.2; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.card-bottom { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.card-price { font-family:var(--fg); font-size:1.15rem; font-weight:700; color:var(--gold); line-height:1; letter-spacing:.03em; }
.card-price-sym { font-size:.65em; font-weight:400; margin-left:2px; vertical-align:middle; opacity:.8; }
.card-tag { font-family:var(--fm); font-size:.58rem; font-weight:600; color:var(--green); border:.5px solid var(--green-line); padding:2px 7px; border-radius:20px; letter-spacing:.06em; text-transform:uppercase; }

/* ── YUKARI ÇIK BUTONU ── */
#scrollTopBtn {
  position:fixed; bottom:24px; right:20px; z-index:500;
  width:46px; height:46px; border-radius:50%;
  background:var(--gold); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 16px rgba(212,175,55,.35);
  opacity:0; transform:translateY(12px);
  transition:opacity .3s, transform .3s;
  pointer-events:none;
}
#scrollTopBtn.show { opacity:1; transform:translateY(0); pointer-events:auto; }
#scrollTopBtn:hover { background:#c9a227; }
#scrollTopBtn svg { width:18px; height:18px; fill:#000; }

/* ── FOOTER ── */
footer { background:var(--black-soft); border-top:1px solid var(--gold-line); padding:32px 20px 28px; text-align:center; }
.footer-logo-img { width:60px; height:60px; border-radius:50%; object-fit:cover; border:.5px solid var(--gold-line); margin:0 auto 12px; display:block; opacity:.7; }
.footer-name { font-family:var(--fg); font-size:1rem; font-weight:700; color:var(--gold); letter-spacing:.14em; text-transform:uppercase; margin-bottom:4px; }
.footer-tagline { font-family:var(--fg); font-style:italic; font-size:.82rem; color:var(--w30); margin-bottom:18px; line-height:1.6; }
.footer-orn { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:16px; }
.footer-orn-line { width:36px; height:.5px; background:var(--gold-line); }
.footer-orn-dot  { width:4px; height:4px; background:var(--gold); transform:rotate(45deg); }
.footer-info { font-family:var(--fm); font-size:.75rem; color:var(--w30); line-height:2; }
.footer-info a { color:var(--green); text-decoration:none; }
.footer-social { display:flex; align-items:center; justify-content:center; gap:12px; margin-top:16px; }
.footer-social a {
  display:flex; align-items:center; justify-content:center;
  width:36px; height:36px; border-radius:50%;
  border:.5px solid var(--gold-line); color:var(--gold); text-decoration:none;
  transition:background .2s;
}
.footer-social a:hover { background:var(--gold-dim); }
.footer-social svg { width:17px; height:17px; fill:currentColor; }

/* ── YORUM POPUP ── */
#reviewPopup {
  position:fixed; inset:0; z-index:8000;
  background:rgba(0,0,0,.75);
  display:flex; align-items:flex-end; justify-content:center;
  padding-bottom:env(safe-area-inset-bottom);
  opacity:0; visibility:hidden;
  transition:opacity .35s, visibility .35s;
}
#reviewPopup.show { opacity:1; visibility:visible; }
.review-card {
  background:var(--black-card);
  border:1px solid var(--gold-line);
  border-radius:20px 20px 0 0;
  padding:28px 24px 32px;
  width:100%; max-width:480px;
  text-align:center;
  transform:translateY(20px);
  transition:transform .35s;
}
#reviewPopup.show .review-card { transform:translateY(0); }
.review-stars { font-size:1.6rem; letter-spacing:4px; margin-bottom:14px; }
.review-title { font-family:var(--fg); font-size:1.2rem; font-weight:600; color:var(--gold); margin-bottom:6px; }
.review-sub { font-family:var(--fm); font-size:.75rem; color:var(--w30); margin-bottom:20px; line-height:1.6; }
.review-btn {
  display:block; width:100%;
  background:var(--gold); color:#000;
  font-family:var(--fm); font-size:.8rem; font-weight:700;
  letter-spacing:.1em; text-transform:uppercase;
  padding:14px; border-radius:10px; border:none;
  cursor:pointer; text-decoration:none;
  margin-bottom:10px;
  transition:background .2s;
}
.review-btn:hover { background:#c9a227; }
.review-dismiss {
  background:none; border:none; cursor:pointer;
  font-family:var(--fm); font-size:.7rem; font-weight:500;
  color:var(--w30); letter-spacing:.08em; text-transform:uppercase;
  padding:8px;
}

/* ── TABLET ── */
@media (min-width:580px) {
  .menu-list { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .card-img-wrap { width:106px; }
}
</style>
</head>

<script>
/* ══ CANVAS DUYURU ══ */
class Announce {
  constructor(el, msgs) {
    this.el = el; this.ctx = el.getContext('2d');
    this.msgs = msgs.filter(m => typeof m==='string' && !m.startsWith('_'));
    this.i=0; this.a=0; this.st='in'; this.t=0;
    this.FADE=28; this.HOLD=190;
    this.pts = Array.from({length:10}, () => this._pt());
    this.resize();
    window.addEventListener('resize', () => this.resize());
    requestAnimationFrame(() => this._tick());
  }
  resize() {
    const dpr = Math.min(devicePixelRatio, 2);
    this.el.width = this.el.offsetWidth * dpr;
    this.el.height = this.el.offsetHeight * dpr;
    this.ctx.scale(dpr, dpr);
    this.W = this.el.offsetWidth; this.H = this.el.offsetHeight;
  }
  _pt() { return { x:Math.random()*1400, y:Math.random()*50, r:Math.random()*1.1+.3, vx:-(Math.random()*.4+.1), vy:(Math.random()-.5)*.2, a:Math.random()*.4+.08 }; }
  _tick() {
    const { ctx, W, H } = this;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#050505'; ctx.fillRect(0,0,W,H);
    this.pts.forEach(p => {
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<-5) p.x=W+5;
      if(p.y<0||p.y>H) p.vy*=-1;
      ctx.save(); ctx.globalAlpha=p.a*.5; ctx.fillStyle='#D4AF37';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill(); ctx.restore();
    });
    const msg=this.msgs[this.i], L=28, sz=Math.min(14,W/26);
    ctx.save(); ctx.globalAlpha=this.a; ctx.fillStyle='#fff';
    ctx.shadowColor='#D4AF37'; ctx.shadowBlur=10*this.a;
    ctx.font=`italic 400 ${sz}px 'EB Garamond',serif`;
    ctx.textBaseline='middle'; ctx.textAlign='left';
    ctx.beginPath(); ctx.rect(L,0,W-L-10,H); ctx.clip();
    let s=msg;
    while(ctx.measureText(s).width>W-L-14&&s.length>5) s=s.slice(0,-4)+'…';
    ctx.fillText(s,L,H/2); ctx.restore();
    if(this.st==='in'){this.a=Math.min(1,this.a+1/this.FADE);if(this.a>=1){this.st='hold';this.t=0;}}
    else if(this.st==='hold'){this.t++;if(this.t>=this.HOLD)this.st='out';}
    else if(this.st==='out'){this.a=Math.max(0,this.a-1/this.FADE);if(this.a<=0){this.i=(this.i+1)%this.msgs.length;this.st='in';}}
    requestAnimationFrame(()=>this._tick());
  }
}

/* ══ YARDIMCILAR ══ */
function badgeClass(b) {
  if (!b) return null;
  if (['Şef Önerisi','Yeni','Büyük Porsiyon'].includes(b)) return 'badge badge-gold';
  if (['Geleneksel','En Çok Satan'].includes(b)) return 'badge badge-green';
  return 'badge badge-dim';
}

/* ══ KART ══ */
function buildCard(item, noImg) {
  const art = document.createElement('article');
  art.className = 'card' + (item.badge==='Şef Önerisi' ? ' chef' : '');

  /* Görsel alanı — logo.png placeholder veya gerçek resim */
  const iw = document.createElement('div');
  iw.className = 'card-img-wrap';

  const shim = document.createElement('div');
  shim.className = 'card-shimmer';
  shim.innerHTML = `<img src="images/logo.png" alt="">`;
  iw.appendChild(shim);

  if (!noImg) {
    const img = document.createElement('img');
    img.className = 'card-img'; img.alt = item.name;
    img.loading = 'lazy'; img.decoding = 'async';
    img.onload  = () => { img.classList.add('show'); shim.style.display='none'; };
    img.src = item.image;
    iw.appendChild(img);
  }

  if (item.badge) {
    const bd = document.createElement('span');
    bd.className = badgeClass(item.badge);
    bd.textContent = item.badge;
    iw.appendChild(bd);
  }

  const body = document.createElement('div');
  body.className = 'card-body';

  const name = document.createElement('h3');
  name.className = 'card-name';
  name.textContent = item.name;

  const bot = document.createElement('div');
  bot.className = 'card-bottom';
  const price = document.createElement('span');
  price.className = 'card-price';
  price.innerHTML = `${item.price} <span class="card-price-sym">₺</span>`;
  const tag = document.createElement('span');
  tag.className = 'card-tag';
  tag.textContent = 'Taş Fırın';
  bot.appendChild(price); bot.appendChild(tag);

  body.appendChild(name); body.appendChild(bot);
  art.appendChild(iw); art.appendChild(body);
  return art;
}

/* ══ BÖLÜM ══ */
function buildSection(cat) {
  const sec = document.createElement('section');
  sec.id = 'cat-' + cat.id; sec.className = 'sec';

  const head = document.createElement('div');
  head.className = 'sec-head';
  const title = document.createElement('h2');
  title.className = 'sec-title'; title.textContent = cat.name;
  const count = document.createElement('span');
  count.className = 'sec-count'; count.textContent = cat.items.length + ' çeşit';
  head.appendChild(title); head.appendChild(count);
  sec.appendChild(head);

  const list = document.createElement('div');
  list.className = 'menu-list';

  const isNoImg = cat.id === 'icecekler'; /* İçeceklerde resim yok */

  cat.items.forEach(item => {
    const noImg = isNoImg || item.image === 'images/logo.png';
    list.appendChild(buildCard(item, noImg));
  });

  sec.appendChild(list);
  return sec;
}

/* ══ AKTİF SEKME ══ */
function setActive(id) {
  document.querySelectorAll('.cat-btn').forEach(b =>
    b.classList.toggle('on', b.dataset.id === id)
  );
}

/* ══ SCROLL SPY ══ */
function initSpy() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) setActive(e.target.id.replace('cat-','')); });
  }, { rootMargin:'-55px 0px -45% 0px', threshold:0 });
  document.querySelectorAll('.sec[id]').forEach(s => obs.observe(s));
}

/* ══ SCROLL TO ══ */
function goTo(id) {
  const el = document.getElementById('cat-' + id);
  if (!el) return;
  const navH = document.querySelector('.cat-nav')?.offsetHeight || 52;
  window.scrollTo({ top: el.getBoundingClientRect().top + scrollY - navH - 4, behavior:'smooth' });
}

/* ══ YUKARI ÇIK ══ */
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTopBtn');
  btn.classList.toggle('show', window.scrollY > 400);
}, { passive:true });

/* ══ YORUM POPUP ══ */
function closeReview(retry) {
  const popup = document.getElementById('reviewPopup');
  popup.classList.remove('show');
  /* "Şimdi Değil" → 120 sn sonra tekrar göster */
  if (retry) {
    setTimeout(() => {
      popup.classList.add('show');
    }, 120000);
  }
}

function initReviewPopup() {
  if (localStorage.getItem('reviewShown')) return;

  const popup = document.getElementById('reviewPopup');

  function showPopup() {
    localStorage.setItem('reviewShown', '1');
    popup.classList.add('show');
  }

  /* 30 saniye sonra ilk gösterim */
  setTimeout(showPopup, 30000);

  /* Popup dışına tıklayınca kapat (retry=true → 120sn sonra yeniden) */
  popup.addEventListener('click', e => {
    if (e.target === popup) closeReview(true);
  });
}

/* ══ RENDER ══ */
function render(d) {
  document.title = d.restaurant.name;

  const note = d.ownerNote?.text || d.ownerNote;
  if (note) {
    document.getElementById('ownerText').textContent = note;
    document.getElementById('ownerBand').style.display = 'flex';
  }

  const cats = d.categories;

  /* nav */
  const nav = document.getElementById('catNav');
  cats.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (i===0?' on':'');
    btn.dataset.id = cat.id;
    btn.setAttribute('role','tab');
    btn.textContent = cat.name;
    btn.addEventListener('click', () => { setActive(cat.id); goTo(cat.id); });
    nav.appendChild(btn);
  });

  /* bölümler */
  const main = document.getElementById('menuMain');
  cats.forEach(cat => main.appendChild(buildSection(cat)));

  /* footer */
  document.getElementById('siteFooter').innerHTML = `
    <img src="images/logo.png" alt="Logo" class="footer-logo-img" onerror="this.style.display='none'">
    <div class="footer-name">${d.restaurant.name}</div>
    <div class="footer-tagline">${d.restaurant.tagline}</div>
    <div class="footer-orn">
      <div class="footer-orn-line"></div>

      <div class="footer-orn-line"></div>
    </div>
    <div class="footer-info">
