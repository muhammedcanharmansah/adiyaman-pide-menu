<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>Adıyaman Pide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Montserrat:wght@400;500;600&family=Lato:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root {
  --black:      #000000;
  --black-soft: #0c0c0c;
  --black-card: #111111;
  --black-line: #1e1e1e;
  --gold:       #D4AF37;
  --gold-dim:   rgba(212,175,55,0.18);
  --gold-line:  rgba(212,175,55,0.25);
  --green:      #2E8B57;
  --green-dim:  rgba(46,139,87,0.15);
  --green-line: rgba(46,139,87,0.3);
  --white:      #ffffff;
  --white-60:   rgba(255,255,255,0.6);
  --white-30:   rgba(255,255,255,0.3);
  --white-10:   rgba(255,255,255,0.07);
  --f-heading:  'Cinzel', 'Playfair Display', Georgia, serif;
  --f-sub:      'Montserrat', system-ui, sans-serif;
  --f-body:     'Lato', system-ui, sans-serif;
  --touch:      52px;
  --r:          14px;
}

/* ══════════════════════════════════════════
   RESET
══════════════════════════════════════════ */
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: var(--f-body);
  background: var(--black);
  color: var(--white);
  overflow-x: hidden;
  padding-bottom: 24px;
  min-height: 100dvh;
}

/* ══════════════════════════════════════════
   LOADING
══════════════════════════════════════════ */
#loading {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--black);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  transition: opacity .5s, visibility .5s;
}
#loading.out { opacity: 0; visibility: hidden; pointer-events: none; }

.load-ring {
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 1.5px solid var(--gold-line);
  border-top-color: var(--gold);
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.load-name {
  font-family: var(--f-heading);
  font-size: 1.2rem;
  color: var(--gold);
  letter-spacing: .18em;
  text-transform: uppercase;
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
header {
  background: var(--black);
  padding: 52px 24px 44px;
  text-align: center;
  position: relative;
  border-bottom: 1px solid var(--gold-line);
  overflow: hidden;
}

/* Subtle radial glow behind the logo */
header::before {
  content: '';
  position: absolute;
  top: -40px; left: 50%; transform: translateX(-50%);
  width: 320px; height: 320px;
  background: radial-gradient(circle, rgba(212,175,55,.06) 0%, transparent 70%);
  pointer-events: none;
}

/* Vertical gold thread top */
header::after {
  content: '';
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 1px; height: 32px;
  background: linear-gradient(to bottom, transparent, var(--gold));
}

.logo-mark {
  display: inline-flex;
  align-items: center; justify-content: center;
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 1px solid var(--gold-line);
  background: var(--black-card);
  font-size: 36px;
  margin-bottom: 20px;
  position: relative;
  animation: pulse-mark 4s ease-in-out infinite;
}
@keyframes pulse-mark {
  0%,100% { box-shadow: 0 0 0 0 rgba(212,175,55,0); }
  50%      { box-shadow: 0 0 0 12px rgba(212,175,55,.06); }
}

.logo-mark::before {
  content: '';
  position: absolute; inset: 6px;
  border-radius: 50%;
  border: .5px solid var(--gold-line);
}

header h1 {
  font-family: var(--f-heading);
  font-size: clamp(1.5rem, 7vw, 2.4rem);
  font-weight: 700;
  color: var(--gold);
  letter-spacing: .1em;
  text-transform: uppercase;
  line-height: 1.1;
  margin-bottom: 6px;
}

header h1 em {
  display: block;
  font-family: var(--f-sub);
  font-size: clamp(.62rem, 2.5vw, .75rem);
  font-weight: 500;
  color: var(--green);
  letter-spacing: .2em;
  text-transform: uppercase;
  margin-top: 10px;
  font-style: normal;
}

.header-ornament {
  display: flex; align-items: center; gap: 12px;
  justify-content: center;
  margin-top: 20px;
}
.orn-line { flex: 1; max-width: 60px; height: .5px; background: var(--gold-line); }
.orn-diamond {
  width: 5px; height: 5px;
  background: var(--gold);
  transform: rotate(45deg);
}

/* ══════════════════════════════════════════
   CANVAS DUYURU
══════════════════════════════════════════ */
.announce-wrap {
  background: #050505;
  border-bottom: 1px solid var(--black-line);
  position: relative;
}
.announce-wrap::before {
  content: '◆';
  position: absolute;
  left: 14px; top: 50%; transform: translateY(-50%);
  font-size: .55rem;
  color: var(--gold);
  letter-spacing: .05em;
  z-index: 2;
}
#announceCanvas {
  display: block; width: 100%; height: 52px;
}

/* ══════════════════════════════════════════
   USTA NOTU
══════════════════════════════════════════ */
.owner-band {
  background: linear-gradient(90deg, #0f0c00 0%, #1a1500 50%, #0f0c00 100%);
  border-bottom: 1px solid var(--gold-line);
  padding: 14px 20px;
  display: flex; align-items: flex-start; gap: 12px;
}
.owner-band-icon {
  font-size: 1.3rem; flex-shrink: 0; margin-top: 1px;
}
.owner-band-text {
  font-family: var(--f-body);
  font-style: italic;
  font-size: .9rem;
  color: rgba(212,175,55,.85);
  line-height: 1.7;
}

/* ══════════════════════════════════════════
   CATEGORY NAV — sticky top
══════════════════════════════════════════ */
.cat-nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(0,0,0,.96);
  border-bottom: 1px solid var(--black-line);
  display: flex;
  overflow-x: auto; overflow-y: hidden;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.cat-nav::-webkit-scrollbar { display: none; }

.cat-btn {
  flex-shrink: 0;
  min-height: var(--touch);
  padding: 0 16px;
  background: none; border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  font-family: var(--f-sub);
  font-size: .68rem;
  font-weight: 500;
  color: var(--white-30);
  display: flex; align-items: center; gap: 6px;
  transition: color .2s, border-color .2s;
  white-space: nowrap;
  position: relative; bottom: -1px;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.cat-btn:active { background: var(--white-10); }
.cat-btn.on {
  color: var(--gold);
  border-bottom-color: var(--gold);
  font-weight: 600;
}
.cat-icon { font-size: .9rem; }

/* ══════════════════════════════════════════
   MAIN
══════════════════════════════════════════ */
main { max-width: 640px; margin: 0 auto; padding: 0 0 32px; }

/* ══════════════════════════════════════════
   CATEGORY SECTION
══════════════════════════════════════════ */
.sec { padding: 32px 16px 8px; }

.sec-head {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 20px;
}
.sec-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--gold-dim);
  border: .5px solid var(--gold-line);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; flex-shrink: 0;
}
.sec-title {
  font-family: var(--f-heading);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: .1em;
  text-transform: uppercase;
  line-height: 1;
}
.sec-count {
  font-family: var(--f-sub);
  font-size: .6rem;
  font-weight: 500;
  color: var(--green);
  margin-top: 4px;
  letter-spacing: .12em;
  text-transform: uppercase;
}

/* ══════════════════════════════════════════
   MENU LIST
══════════════════════════════════════════ */
.menu-list { display: flex; flex-direction: column; gap: 2px; }

/* ── CARD ── */
.card {
  background: var(--black-card);
  border: .5px solid var(--black-line);
  border-radius: var(--r);
  display: flex; align-items: stretch;
  overflow: hidden;
  min-height: 100px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  position: relative;
  opacity: 0;
  transform: translateY(12px);
  animation: fadeUp .4s ease forwards;
}
@keyframes fadeUp { to { opacity:1; transform:translateY(0); } }

.card:nth-child(1)  { animation-delay: .03s; }
.card:nth-child(2)  { animation-delay: .06s; }
.card:nth-child(3)  { animation-delay: .09s; }
.card:nth-child(4)  { animation-delay: .12s; }
.card:nth-child(5)  { animation-delay: .15s; }
.card:nth-child(6)  { animation-delay: .18s; }
.card:nth-child(7)  { animation-delay: .21s; }
.card:nth-child(8)  { animation-delay: .24s; }

.card:hover, .card:focus-visible {
  background: #161616;
  border-color: var(--gold-line);
  outline: none;
}
.card:active { transform: scale(.985); }

/* Left gold accent bar — only on "Şef Önerisi" */
.card.chef::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, transparent, var(--gold), transparent);
}

/* ── IMAGE ── */
.card-img-wrap {
  width: 104px; flex-shrink: 0;
  background: #0e0e0e;
  position: relative; overflow: hidden;
}
.card-shimmer {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  color: rgba(255,255,255,.08);
  font-size: 1.6rem;
  overflow: hidden;
}
.card-shimmer::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.04), transparent);
  background-size: 200% 100%;
  animation: shim 1.8s ease-in-out infinite;
}
@keyframes shim { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

.card-img {
  position: absolute; inset: 0; z-index: 1;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity .35s ease;
}
.card-img.show { opacity: 1; }

/* ── BADGE ── */
.badge {
  position: absolute; top: 8px; left: 8px; z-index: 2;
  font-family: var(--f-sub);
  font-size: .54rem; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 20px;
  white-space: nowrap;
}
.badge-gold   { background: var(--gold); color: #000; }
.badge-green  { background: var(--green); color: #fff; }
.badge-white  { background: rgba(255,255,255,.12); color: var(--white-60); border: .5px solid rgba(255,255,255,.1); }

/* ── BODY ── */
.card-body {
  flex: 1; min-width: 0;
  padding: 14px 14px 14px 16px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.card-name {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1rem; font-weight: 700;
  color: var(--white);
  line-height: 1.25;
  margin-bottom: 5px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.card-desc {
  font-family: var(--f-body);
  font-size: .76rem; font-weight: 300;
  color: var(--white-30);
  font-style: italic;
  line-height: 1.7;
  flex: 1; margin-bottom: 10px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.card-footer-row {
  display: flex; align-items: center;
  justify-content: space-between; gap: 8px;
}
.card-price {
  font-family: var(--f-heading);
  font-size: 1.1rem; font-weight: 700;
  color: var(--gold);
  line-height: 1;
  letter-spacing: .04em;
}
.card-price-sym {
  font-size: .7em; font-weight: 400;
  margin-right: 1px; vertical-align: middle;
}
.card-tag {
  font-family: var(--f-sub);
  font-size: .58rem; font-weight: 600;
  color: var(--green);
  border: .5px solid var(--green-line);
  padding: 2px 8px; border-radius: 20px;
  letter-spacing: .08em;
  text-transform: uppercase;
}

/* ══════════════════════════════════════════
   SECTION DIVIDER (between categories)
══════════════════════════════════════════ */
.sec-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--black-line), transparent);
  margin: 8px 16px 0;
}

/* ══════════════════════════════════════════
   FOOTER
══════════════════════════════════════════ */
footer {
  background: var(--black-soft);
  border-top: 1px solid var(--gold-line);
  padding: 36px 24px 28px;
  text-align: center;
}
.footer-logo {
  font-family: var(--f-heading);
  font-size: 1.1rem; font-weight: 700;
  color: var(--gold);
  letter-spacing: .14em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.footer-tagline {
  font-family: var(--f-body);
  font-style: italic;
  font-size: .85rem;
  color: var(--white-30);
  line-height: 1.7;
  margin-bottom: 20px;
}
.footer-orn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-bottom: 20px;
}
.footer-orn-line { width: 40px; height: .5px; background: var(--gold-line); }
.footer-orn-dot  { width: 4px; height: 4px; background: var(--gold); transform: rotate(45deg); }

.footer-info {
  font-family: var(--f-body);
  font-size: .8rem;
  color: var(--white-30);
  line-height: 2;
}
.footer-info a { color: var(--green); text-decoration: none; }
.footer-badge {
  font-family: var(--f-sub);
  display: inline-block; margin-top: 16px;
  border: .5px solid var(--gold-line);
  padding: 5px 16px; border-radius: 20px;
  font-size: .58rem; letter-spacing: .16em;
  text-transform: uppercase; color: var(--gold);
  font-weight: 600;
}

/* ══════════════════════════════════════════
   TABLET
══════════════════════════════════════════ */
@media (min-width: 580px) {
  .menu-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .card-img-wrap { width: 110px; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="load-ring"></div>
  <div class="load-name">Adıyaman Pide</div>
</div>

<!-- HEADER -->
<header>
  <div class="logo-mark">🫓</div>
  <h1 id="rName">Adıyaman Pide
    <em id="rTagline">Ustanın Elinden, Toprağın Özünden</em>
  </h1>
  <div class="header-ornament">
    <div class="orn-line"></div>
    <div class="orn-diamond"></div>
    <div class="orn-line"></div>
  </div>
</header>

<!-- CANVAS -->
<div class="announce-wrap">
  <canvas id="announceCanvas"></canvas>
</div>

<!-- OWNER NOTE -->
<div class="owner-band" id="ownerBand" style="display:none">
  <span class="owner-band-icon">👨‍🍳</span>
  <p class="owner-band-text" id="ownerText"></p>
</div>

<!-- CATEGORY NAV -->
<nav class="cat-nav" id="catNav" role="tablist"></nav>

<!-- MAIN MENU -->
<main id="menuMain" role="main"></main>

<!-- FOOTER -->
<footer id="siteFooter"></footer>

<!-- ══ SCRIPTS ══ -->
<script>
/* ────────────────────────────────
   CANVAS ANNOUNCEMENT ENGINE
──────────────────────────────── */
class AnnounceCanvas {
  constructor(el, msgs) {
    this.el   = el;
    this.ctx  = el.getContext('2d');
    this.msgs = msgs.filter(m => !m.startsWith('_'));
    this.i    = 0;
    this.a    = 0;
    this.st   = 'in'; // in | hold | out
    this.t    = 0;
    this.FADE = 30;
    this.HOLD = 190;
    this.pts  = Array.from({length:12}, () => this._pt());
    this.resize();
    window.addEventListener('resize', () => this.resize());
    requestAnimationFrame(() => this._tick());
  }

  resize() {
    const dpr = Math.min(devicePixelRatio, 2);
    this.el.width  = this.el.offsetWidth * dpr;
    this.el.height = this.el.offsetHeight * dpr;
    this.ctx.scale(dpr, dpr);
    this.W = this.el.offsetWidth;
    this.H = this.el.offsetHeight;
  }

  _pt() {
    return {
      x: Math.random() * 1200,
      y: Math.random() * 52,
      r: Math.random() * 1.2 + .3,
      vx: -(Math.random() * .4 + .1),
      vy: (Math.random() - .5) * .2,
      a: Math.random() * .4 + .08
    };
  }

  _draw() {
    const { ctx, W, H } = this;
    ctx.clearRect(0, 0, W, H);

    // bg
    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, W, H);

    // particles
    this.pts.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < -5) p.x = W + 5;
      if (p.y < 0 || p.y > H) p.vy *= -1;
      ctx.save();
      ctx.globalAlpha = p.a * .5;
      ctx.fillStyle = '#D4AF37';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });

    // message
    const msg  = this.msgs[this.i];
    const LEFT = 32;
    const SIZE = Math.min(14, W / 28);
    ctx.save();
    ctx.globalAlpha = this.a;
    ctx.fillStyle   = '#fff';
    ctx.shadowColor = '#D4AF37';
    ctx.shadowBlur  = 10 * this.a;
    ctx.font        = `italic 400 ${SIZE}px 'Cormorant Garamond', serif`;
    ctx.textBaseline = 'middle';
    ctx.textAlign    = 'left';
    ctx.beginPath();
    ctx.rect(LEFT, 0, W - LEFT - 10, H);
    ctx.clip();
    let s = msg;
    const max = W - LEFT - 14;
    while (ctx.measureText(s).width > max && s.length > 5) s = s.slice(0,-4)+'…';
    ctx.fillText(s, LEFT, H/2);
    ctx.restore();
  }

  _tick() {
    this._draw();
    if      (this.st === 'in')   { this.a = Math.min(1, this.a + 1/this.FADE); if (this.a>=1) { this.st='hold'; this.t=0; } }
    else if (this.st === 'hold') { this.t++; if (this.t >= this.HOLD) this.st='out'; }
    else if (this.st === 'out')  { this.a = Math.max(0, this.a - 1/this.FADE); if (this.a<=0) { this.i=(this.i+1)%this.msgs.length; this.st='in'; } }
    requestAnimationFrame(() => this._tick());
  }
}

/* ────────────────────────────────
   BADGE HELPER
──────────────────────────────── */
function badgeClass(b) {
  if (!b) return null;
  const g = ['Şef Önerisi','Yeni','Büyük Porsiyon'];
  const gr = ['Geleneksel'];
  if (g.includes(b))  return 'badge badge-gold';
  if (gr.includes(b)) return 'badge badge-green';
  return 'badge badge-white';
}

/* ────────────────────────────────
   BUILD CARD
──────────────────────────────── */
function buildCard(item) {
  const art = document.createElement('article');
  art.className = 'card' + (item.badge === 'Şef Önerisi' ? ' chef' : '');
  art.setAttribute('role', 'listitem');

  // image side
  const iw = document.createElement('div');
  iw.className = 'card-img-wrap';

  const shim = document.createElement('div');
  shim.className = 'card-shimmer';
  shim.textContent = '🫓';
  iw.appendChild(shim);

  const img = document.createElement('img');
  img.className = 'card-img';
  img.alt = item.name;
  img.loading = 'lazy';
  img.decoding = 'async';
  img.onload  = () => { img.classList.add('show'); shim.style.display = 'none'; };
  img.onerror = () => { shim.textContent = item.name[0]; };
  img.src = item.image;
  iw.appendChild(img);

  if (item.badge) {
    const bd = document.createElement('span');
    bd.className = badgeClass(item.badge);
    bd.textContent = item.badge;
    iw.appendChild(bd);
  }

  // body
  const body = document.createElement('div');
  body.className = 'card-body';

  const name = document.createElement('h3');
  name.className = 'card-name';
  name.textContent = item.name;

  const desc = document.createElement('p');
  desc.className = 'card-desc';
  desc.textContent = item.description;

  const row = document.createElement('div');
  row.className = 'card-footer-row';

  const price = document.createElement('span');
  price.className = 'card-price';
  price.innerHTML = `<span class="card-price-sym">₺</span>${item.price}`;

  const tag = document.createElement('span');
  tag.className = 'card-tag';
  tag.textContent = 'Taş Fırın';

  row.appendChild(price);
  row.appendChild(tag);
  body.appendChild(name);
  body.appendChild(desc);
  body.appendChild(row);

  art.appendChild(iw);
  art.appendChild(body);
  return art;
}

/* ────────────────────────────────
   BUILD SECTION
──────────────────────────────── */
function buildSection(cat) {
  const sec = document.createElement('section');
  sec.id = 'cat-' + cat.id;
  sec.className = 'sec';

  const head = document.createElement('div');
  head.className = 'sec-head';

  const icon = document.createElement('div');
  icon.className = 'sec-icon';
  icon.textContent = cat.icon;

  const info = document.createElement('div');
  const title = document.createElement('h2');
  title.className = 'sec-title';
  title.textContent = cat.name;
  const count = document.createElement('div');
  count.className = 'sec-count';
  count.textContent = cat.items.length + ' çeşit';
  info.appendChild(title);
  info.appendChild(count);

  head.appendChild(icon);
  head.appendChild(info);
  sec.appendChild(head);

  const list = document.createElement('div');
  list.className = 'menu-list';
  list.setAttribute('role', 'list');
  cat.items.forEach(item => list.appendChild(buildCard(item)));
  sec.appendChild(list);

  const div = document.createElement('div');
  div.className = 'sec-divider';
  sec.appendChild(div);

  return sec;
}

/* ────────────────────────────────
   SYNC NAV ACTIVE STATE
──────────────────────────────── */
function setActive(id) {
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.toggle('on', b.dataset.id === id);
  });
}

/* ────────────────────────────────
   SCROLL SPY
──────────────────────────────── */
function initSpy() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) setActive(e.target.id.replace('cat-',''));
    });
  }, { rootMargin: '-55px 0px -45% 0px', threshold: 0 });
  document.querySelectorAll('.sec[id]').forEach(s => obs.observe(s));
}

/* ────────────────────────────────
   SCROLL TO SECTION
──────────────────────────────── */
function scrollTo(id) {
  const el = document.getElementById('cat-' + id);
  if (!el) return;
  const offset = document.querySelector('.cat-nav')?.offsetHeight || 52;
  window.scrollTo({ top: el.getBoundingClientRect().top + scrollY - offset - 4, behavior: 'smooth' });
}

/* ────────────────────────────────
   RENDER
──────────────────────────────── */
function render(d) {
  // header
  document.getElementById('rName').innerHTML =
    d.restaurant.name + `<em>${d.restaurant.tagline}</em>`;
  document.title = d.restaurant.name;

  // owner note
  const note = d.ownerNote?.text || d.ownerNote;
  if (note) {
    document.getElementById('ownerText').textContent = note;
    document.getElementById('ownerBand').style.display = 'flex';
  }

  const cats = d.categories;

  // üst kategori nav — tek nav
  const catNav = document.getElementById('catNav');
  cats.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (i === 0 ? ' on' : '');
    btn.dataset.id = cat.id;
    btn.setAttribute('role', 'tab');
    btn.innerHTML = `<span class="cat-icon">${cat.icon}</span>${cat.name}`;
    btn.addEventListener('click', () => { setActive(cat.id); scrollTo(cat.id); });
    catNav.appendChild(btn);
  });

  // sections
  const main = document.getElementById('menuMain');
  cats.forEach(cat => main.appendChild(buildSection(cat)));

  // footer
  document.getElementById('siteFooter').innerHTML = `
    <div class="footer-logo">${d.restaurant.name}</div>
    <div class="footer-tagline">${d.restaurant.tagline}</div>
    <div class="footer-orn">
      <div class="footer-orn-line"></div>
      <div class="footer-orn-dot"></div>
      <div class="footer-orn-line"></div>
    </div>
    <div class="footer-info">
      📍 ${d.restaurant.address}<br>
      <a href="tel:${d.restaurant.phone.replace(/\s/g,'')}">📞 ${d.restaurant.phone}</a>
    </div>
    <div class="footer-badge">Altının Zarafeti · Toprağın Özü</div>
  `;

  // canvas
  new AnnounceCanvas(
    document.getElementById('announceCanvas'),
    d.announcements
  );

  // hide loader
  setTimeout(() => document.getElementById('loading').classList.add('out'), 450);
  initSpy();
}

/* ────────────────────────────────
   FETCH
──────────────────────────────── */
fetch('menu.json')
  .then(r => { if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(render)
  .catch(err => {
    const l = document.getElementById('loading');
    l.innerHTML = `
      <div style="text-align:center;padding:32px;font-family:'DM Sans',sans-serif">
        <div style="font-size:2.5rem;margin-bottom:16px">⚠️</div>
        <p style="color:#D4AF37;font-family:'Cormorant Garamond',serif;font-size:1.2rem;margin-bottom:8px">Menü yüklenemedi</p>
        <p style="color:rgba(255,255,255,.3);font-size:.8rem">menu.json aynı klasörde olmalı</p>
        <button onclick="location.reload()" style="
          margin-top:20px;padding:10px 28px;
          background:#2E8B57;color:#fff;border:none;
          border-radius:8px;font-family:'DM Sans',sans-serif;
          font-size:.85rem;cursor:pointer">
          Tekrar Dene
        </button>
      </div>`;
    l.style.cssText='opacity:1;visibility:visible';
    console.error(err);
  });
</script>
</body>
