<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lezzet Durağı — Menü</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0e0e0e;
      --bg2:      #161616;
      --bg3:      #1e1e1e;
      --gold:     #c9a84c;
      --gold-lt:  #e8c97a;
      --text:     #f0ece4;
      --muted:    #888;
      --border:   rgba(201,168,76,0.18);
      --radius:   14px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      text-align: center;
      padding: 56px 24px 40px;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1;
      color: var(--text);
    }
    .hero-logo span { color: var(--gold); }
    .hero-tagline {
      margin-top: 10px;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .hero-divider {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin: 20px auto 0;
      opacity: 0.6;
    }

    /* ── KATEGORİ NAVİGASYON ── */
    .nav-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(14,14,14,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-scroll {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      padding: 0 16px;
      scrollbar-width: none;
    }
    .nav-scroll::-webkit-scrollbar { display: none; }
    .nav-btn {
      flex-shrink: 0;
      padding: 14px 18px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .nav-btn:hover { color: var(--text); }
    .nav-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* ── YÜKLEME ── */
    .loading {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.1em;
    }
    .loading-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--gold);
      border-radius: 50%;
      margin: 0 3px;
      animation: bounce 1.2s infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-8px); opacity: 1; }
    }

    /* ── MENÜ İÇERİĞİ ── */
    #menu-container { padding: 0 0 40px; }

    .kategori-section { padding-top: 8px; }

    .kategori-baslik {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 32px 20px 16px;
    }
    .kategori-baslik h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(24px, 5vw, 32px);
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }
    .kategori-baslik::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .urun-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1px;
      background: var(--border);
      margin: 0 16px;
      border-radius: var(--radius);
      overflow: hidden;
    }

    .urun-kart {
      display: flex;
      gap: 16px;
      align-items: center;
      background: var(--bg2);
      padding: 16px;
      transition: background 0.2s;
      cursor: default;
    }
    .urun-kart:hover { background: var(--bg3); }
    .urun-kart:first-child { border-radius: var(--radius) var(--radius) 0 0; }
    .urun-kart:last-child  { border-radius: 0 0 var(--radius) var(--radius); }
    .urun-kart:only-child  { border-radius: var(--radius); }

    .urun-resim {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg3);
    }

    .urun-bilgi { flex: 1; min-width: 0; }
    .urun-ad {
      font-family: 'Cormorant Garamond', serif;
      font-size: 19px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .urun-aciklama {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .urun-fiyat {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 40px;
      border-top: 1px solid var(--border);
      padding: 36px 24px 20px;
      text-align: center;
    }

    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--gold);
      margin-bottom: 20px;
    }

    .footer-bilgi {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      margin-bottom: 28px;
    }

    .footer-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--muted);
    }
    .footer-item a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-item a:hover { color: var(--gold); }

    .footer-icon {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .admin-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 20px auto 0;
      padding: 12px 24px;
      border: 1px solid var(--border);
      border-radius: 40px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .admin-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .credit {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 11px;
      color: rgba(136,136,136,0.5);
      letter-spacing: 0.05em;
    }
    .credit a {
      color: rgba(201,168,76,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }
    .credit a:hover { color: var(--gold); }

    /* ── SCROLL ANİMASYON ── */
    .kategori-section {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .kategori-section.visible {
      opacity: 1;
      transform: none;
    }

    /* ── TABLET/DESKTOP ── */
    @media (min-width: 600px) {
      .urun-grid {
        grid-template-columns: 1fr 1fr;
      }
      .urun-kart:first-child  { border-radius: var(--radius) 0 0 0; }
      .urun-kart:nth-child(2) { border-radius: 0 var(--radius) 0 0; }
    }

    @media (min-width: 960px) {
      .urun-grid { grid-template-columns: 1fr 1fr 1fr; margin: 0 32px; }
      .kategori-baslik { padding: 40px 32px 20px; }
      .hero { padding: 72px 24px 48px; }
    }
  </style>
</head>
<body>

<header class="hero">
  <div class="hero-logo">Lezzet <span>Durağı</span></div>
  <div class="hero-tagline">Geleneksel tatlar, modern dokunuş</div>
  <div class="hero-divider"></div>
</header>

<nav class="nav-wrap">
  <div class="nav-scroll" id="kategori-nav">
    <!-- JS dolduracak -->
  </div>
</nav>

<main id="menu-container">
  <div class="loading">
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
  </div>
</main>

<footer>
  <div class="footer-logo">Lezzet Durağı</div>

  <div class="footer-bilgi">
    <div class="footer-item">
      <div class="footer-icon">📍</div>
      <span>Atatürk Cad. No:42, Kadıköy / İstanbul</span>
    </div>
    <div class="footer-item">
      <div class="footer-icon">📞</div>
      <a href="tel:+902161234567">+90 216 123 45 67</a>
    </div>
    <div class="footer-item">
      <div class="footer-icon">🕐</div>
      <span>Her gün 11:00 — 23:00</span>
    </div>
  </div>

  <a href="admin.html" class="admin-btn">
    ⚙️ &nbsp;Yönetim Paneli
  </a>

  <div class="credit">
    Bu site <a href="mailto:muhammedcanharmanshah@gmail.com">Muhammed Can Harmanşah</a> tarafından tasarlanmış ve geliştirilmiştir.
  </div>
</footer>

<script>
  const SHEET_ID = 'https://docs.google.com/spreadsheets/d/1zDjTN5uhxswGurwEWk7F2ESkR9NbHutF0tZIKBTsJ9k/edit?usp=sharing';

  // ── Örnek veri (Sheet bağlanana kadar) ──
  const ORNEK_VERI = [
    { kategori: 'Pizza', ad: 'Margarita', fiyat: 180, aciklama: 'Domates sosu, taze mozzarella, fesleğen', resim: 'https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=200&q=80', aktif: true },
    { kategori: 'Pizza', ad: 'Karışık', fiyat: 220, aciklama: 'Sucuk, mantar, biber, mısır', resim: 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=200&q=80', aktif: true },
    { kategori: 'Pizza', ad: 'Fiorella', fiyat: 200, aciklama: 'Sosis, mantar, yeşil biber', resim: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200&q=80', aktif: true },
    { kategori: 'Burger', ad: 'Klasik Burger', fiyat: 160, aciklama: 'Dana köfte, cheddar, karamelize soğan', resim: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200&q=80', aktif: true },
    { kategori: 'Burger', ad: 'Crispy Chicken', fiyat: 150, aciklama: 'Çıtır tavuk, coleslaw, acı sos', resim: 'https://images.unsplash.com/photo-1606755962773-d324e0a13086?w=200&q=80', aktif: true },
    { kategori: 'İçecek', ad: 'Ayran', fiyat: 30, aciklama: 'Ev yapımı, taze çırpılmış', resim: 'https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=200&q=80', aktif: true },
    { kategori: 'İçecek', ad: 'Taze Sıkma OJ', fiyat: 55, aciklama: 'Günlük taze portakal suyu', resim: 'https://images.unsplash.com/photo-1613478223719-2ab802602423?w=200&q=80', aktif: true },
    { kategori: 'Tatlı', ad: 'Künefe', fiyat: 120, aciklama: 'Fıstıklı, sıcak servis', resim: 'https://images.unsplash.com/photo-1579954115545-a95591f28bfc?w=200&q=80', aktif: true },
  ];

  function menuYukle(urunler) {
    const aktifler = urunler.filter(u => u.aktif);
    const kategoriler = {};
    aktifler.forEach(u => {
      if (!kategoriler[u.kategori]) kategoriler[u.kategori] = [];
      kategoriler[u.kategori].push(u);
    });

    // Nav doldur
    const nav = document.getElementById('kategori-nav');
    nav.innerHTML = '';
    Object.keys(kategoriler).forEach((kat, i) => {
      const btn = document.createElement('button');
      btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
      btn.textContent = kat;
      btn.dataset.kat = kat;
      btn.onclick = () => {
        document.getElementById('kat-' + kat)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };
      nav.appendChild(btn);
    });

    // Menü doldur
    const container = document.getElementById('menu-container');
    container.innerHTML = '';
    Object.entries(kategoriler).forEach(([kat, urunListesi]) => {
      const section = document.createElement('section');
      section.className = 'kategori-section';
      section.id = 'kat-' + kat;

      let kartlar = urunListesi.map(u => `
        <div class="urun-kart">
          <img class="urun-resim" src="${u.resim}" alt="${u.ad}"
            onerror="this.src='https://placehold.co/80x80/1e1e1e/888?text=Resim'">
          <div class="urun-bilgi">
            <div class="urun-ad">${u.ad}</div>
            <div class="urun-aciklama">${u.aciklama}</div>
          </div>
          <div class="urun-fiyat">${u.fiyat} ₺</div>
        </div>
      `).join('');

      section.innerHTML = `
        <div class="kategori-baslik"><h2>${kat}</h2></div>
        <div class="urun-grid">${kartlar}</div>
      `;
      container.appendChild(section);
    });

    // Scroll animasyonu
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) e.target.classList.add('visible');
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.kategori-section').forEach(s => observer.observe(s));

    // Aktif nav takibi
    const sectionler = document.querySelectorAll('.kategori-section');
    const navBtnler = document.querySelectorAll('.nav-btn');
    const scrollObserver = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          navBtnler.forEach(b => b.classList.remove('active'));
          const aktif = nav.querySelector(`[data-kat="${e.target.id.replace('kat-','')}"]`);
          if (aktif) {
            aktif.classList.add('active');
            aktif.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          }
        }
      });
    }, { rootMargin: '-40% 0px -55% 0px' });
    sectionler.forEach(s => scrollObserver.observe(s));
  }

  // Google Sheets'ten çek, hata olursa örnek veriyi göster
  function veriCek() {
    if (SHEET_ID === 'https://docs.google.com/spreadsheets/d/1zDjTN5uhxswGurwEWk7F2ESkR9NbHutF0tZIKBTsJ9k/edit?usp=sharing') {
      menuYukle(ORNEK_VERI);
      return;
    }
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&t=${Date.now()}`;
    fetch(url)
      .then(r => r.text())
      .then(text => {
        const json = JSON.parse(text.substring(47, text.length - 2));
        const urunler = json.table.rows.map(satir => ({
          kategori: satir.c[0]?.v || '',
          ad:       satir.c[1]?.v || '',
          fiyat:    satir.c[2]?.v || 0,
          aciklama: satir.c[3]?.v || '',
          resim:    satir.c[4]?.v || '',
          aktif:    satir.c[5]?.v === true || satir.c[5]?.v === 'TRUE'
        }));
        menuYukle(urunler);
      })
      .catch(() => menuYukle(ORNEK_VERI));
  }

  veriCek();
</script>
</body>
</html>
