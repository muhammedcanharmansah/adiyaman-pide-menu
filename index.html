<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menü</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; }

    header {
      background: #1a1a1a;
      color: white;
      text-align: center;
      padding: 24px;
    }

    .kategori { padding: 24px 16px 8px; }
    .kategori h2 {
      font-size: 20px;
      border-bottom: 2px solid #e63946;
      padding-bottom: 8px;
      margin-bottom: 16px;
    }

    .urun-kart {
      display: flex;
      gap: 12px;
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .urun-kart img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
    }

    .urun-bilgi { flex: 1; }
    .urun-bilgi h3 { font-size: 15px; margin-bottom: 4px; }
    .urun-bilgi p { font-size: 13px; color: #666; margin-bottom: 8px; }
    .fiyat { font-weight: 600; color: #e63946; font-size: 15px; }

    #yukleniyor {
      text-align: center;
      padding: 60px;
      color: #999;
    }
  </style>
</head>
<body>

<header>
  <h1>Restoran Adı</h1>
  <p>Menümüz</p>
</header>

<div id="menu-container">
  <p id="yukleniyor">Menü yükleniyor...</p>
</div>

<script>
  const SHEET_ID = '1zDjTN5uhxswGurwEWk7F2ESkR9NbHutF0tZIKBTsJ9k';
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

  fetch(url)
    .then(res => res.text())
    .then(text => {
      // Google garip bir format döndürür, JSON kısmını ayıklıyoruz
      const json = JSON.parse(text.substring(47, text.length - 2));
      const satirlar = json.table.rows;

      // Verileri düzenli hale getir
      const urunler = satirlar.map(satir => ({
        kategori: satir.c[0]?.v || '',
        ad:       satir.c[1]?.v || '',
        fiyat:    satir.c[2]?.v || 0,
        aciklama: satir.c[3]?.v || '',
        resim:    satir.c[4]?.v || '',
        aktif:    satir.c[5]?.v === true || satir.c[5]?.v === 'TRUE'
      }));

      // Sadece aktif ürünleri al
      const aktifler = urunler.filter(u => u.aktif);

      // Kategorilere göre grupla
      const kategoriler = {};
      aktifler.forEach(urun => {
        if (!kategoriler[urun.kategori]) {
          kategoriler[urun.kategori] = [];
        }
        kategoriler[urun.kategori].push(urun);
      });

      // HTML'e bas
      const container = document.getElementById('menu-container');
      container.innerHTML = '';

      Object.entries(kategoriler).forEach(([kategoriAd, urunListesi]) => {
        const section = document.createElement('div');
        section.className = 'kategori';
        section.innerHTML = `<h2>${kategoriAd}</h2>`;

        urunListesi.forEach(urun => {
          section.innerHTML += `
            <div class="urun-kart">
              <img
                src="${urun.resim}"
                alt="${urun.ad}"
                onerror="this.src='https://placehold.co/90x90?text=Resim+Yok'"
              >
              <div class="urun-bilgi">
                <h3>${urun.ad}</h3>
                <p>${urun.aciklama}</p>
                <span class="fiyat">${urun.fiyat} ₺</span>
              </div>
            </div>
          `;
        });

        container.appendChild(section);
      });
    })
    .catch(() => {
      document.getElementById('yukleniyor').textContent =
        'Menü yüklenemedi. Lütfen daha sonra tekrar deneyin.';
    });
</script>

</body>
</html>
